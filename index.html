<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>TUNA</title>
  <link rel="stylesheet" href="start.css">
</head>

<body>

<header>
  <div class="logo">TUNA</div>
  <nav>
    <a href="index.html">Sākums</a>
    <a href="store.html">Veikals</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <p>
      Augstas kvalitātes apģērbs, kas izskatās kā oriģināls, bet maksā mazāk.
      Stilīgs izskats par pieejamu cenu.
    </p>
    <a href="store.html">
      <button>Pērc tagad</button>
    </a>
  </div>
</section>

<section class="products">
  <h2>Preces ar atlaidi</h2>

  <div class="grid">

    <div class="card">
      <img src="garaspiedurknes.webp" class="img">
      <p>Garas piedurknes krekls</p>
      <span class="old">€50</span>
      <span class="new">€30</span>
    </div>

    <div class="card">
      <img src="hodie.jpg" class="img">
      <p>Tuna džemperis</p>
      <span class="old">€60</span>
      <span class="new">€35</span>
    </div>

    <div class="card">
      <img src="shirt.jpg" class="img">
      <p>Tuna t-krekls</p>
      <span class="old">€40</span>
      <span class="new">€25</span>
    </div>

  </div>
</section>

<section class="products">
  <h2>Jaunākās preces</h2>

  <div class="grid center">

    <div class="card">
      <img src="zilskrekls.jpg" class="img">
      <p>Tuna t-krekls</p>
      <span class="new">€50</span>
    </div>

    <div class="card">
      <img src="puta.png" class="img">
      <p>Puta čības </p>
      <span class="new">€60</span>
    </div>

  </div>
</section>

</body>
</html>
